<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ফ্রি ভিডিও গ্যালারি</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
  body { background: #0f0f1a; color: white; padding: 16px; }
  h1 { font-size: 20px; margin-bottom: 16px; text-align: center; }
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .tab-btn {
    flex: 1;
    padding: 10px;
    background: #1a1a2e;
    color: #a0a0c0;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
  }
  .tab-btn.active {
    background: #6c5ce7;
    color: white;
  }
  .segment-title {
    font-size: 17px;
    margin: 20px 0 10px 0;
    padding-bottom: 6px;
    border-bottom: 2px solid #6c5ce7;
  }
  .video-card { background: #1a1a2e; border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
  .video-card img { width: 100%; display: block; pointer-events: none; }
  .video-card h3 { padding: 12px; font-size: 15px; }
  .download-btn {
    display: block;
    width: 100%;
    text-align: center;
    background: #6c5ce7;
    color: white;
    text-decoration: none;
    padding: 12px;
    font-weight: bold;
    border: none;
    font-size: 15px;
    cursor: pointer;
  }
  .empty { text-align: center; color: #a0a0c0; margin-top: 40px; }
</style>
</head>
<body>
  <h1>🎁 ফ্রি ভিডিও গ্যালারি</h1>

  <div class="tabs">
    <button class="tab-btn active" id="tab-all" onclick="showTab('all')">সব ভিডিও</button>
    <button class="tab-btn" id="tab-morning" onclick="showTab('morning')">☀️ দিনের ভিডিও</button>
    <button class="tab-btn" id="tab-night" onclick="showTab('night')">🌙 রাতের ভিডিও</button>
  </div>

  <div id="gallery"> 🔃 লোড হচ্ছে...</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBL1UNjemUQERSmF_G8_nmxjNnUYQqKPsU",
      authDomain: "freemathod-fb-yt-service-bd.firebaseapp.com",
      projectId: "freemathod-fb-yt-service-bd",
      storageBucket: "freemathod-fb-yt-service-bd.firebasestorage.app",
      messagingSenderId: "1029948659030",
      appId: "1:1029948659030:web:bd901848b2593add4272f7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const DELIVERY_BOT_USERNAME = "freemethodvideodelivery_bot";

    let allVideos = [];
    let morningVideos = [];
    let nightVideos = [];
    let currentTab = "all";

    function openDeliveryBot(videoCode) {
      const link = "https://t.me/" + DELIVERY_BOT_USERNAME + "?start=" + videoCode;
      if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.openTelegramLink(link);
      } else {
        window.open(link, "_blank");
      }
    }
    window.openDeliveryBot = openDeliveryBot;

    function renderVideoCard(data) {
      return '<div class="video-card">' +
               '<img src="' + data.thumbnail_url + '" alt="' + data.title + '" />' +
               '<h3>' + data.title + '</h3>' +
               '<button class="download-btn" onclick="openDeliveryBot(\'' + data.video_code + '\')">⬇ Download</button>' +
             '</div>';
    }

    function renderTab(tab) {
      const container = document.getElementById('gallery');
      let html = '';

      if (tab === 'all') {
        if (morningVideos.length > 0) {
          html += '<div class="segment-title">☀️ সকালের ভিডিও</div>';
          morningVideos.forEach((data) => { html += renderVideoCard(data); });
        }
        if (nightVideos.length > 0) {
          html += '<div class="segment-title">🌙 রাতের ভিডিও</div>';
          nightVideos.forEach((data) => { html += renderVideoCard(data); });
        }
      } else if (tab === 'morning') {
        morningVideos.forEach((data) => { html += renderVideoCard(data); });
      } else if (tab === 'night') {
        nightVideos.forEach((data) => { html += renderVideoCard(data); });
      }

      if (html === '') {
        html = '<p class="empty">এই বিভাগে এখনো কোনো ভিডিও নেই।</p>';
      }

      container.innerHTML = html;
    }

    function showTab(tab) {
      currentTab = tab;
      document.getElementById('tab-all').classList.remove('active');
      document.getElementById('tab-morning').classList.remove('active');
      document.getElementById('tab-night').classList.remove('active');
      document.getElementById('tab-' + tab).classList.add('active');
      renderTab(tab);
    }
    window.showTab = showTab;

    async function loadVideos() {
      const querySnapshot = await getDocs(collection(db, "free_videos"));

      if (querySnapshot.empty) {
        document.getElementById('gallery').innerHTML = '<p class="empty">এখনো কোনো ভিডিও যোগ করা হয়নি।</p>';
        return;
      }

      querySnapshot.forEach((doc) => {
        const data = doc.data();
        allVideos.push(data);
        if (data.category === "night") {
          nightVideos.push(data);
        } else {
          morningVideos.push(data);
        }
      });

      renderTab(currentTab);
    }

    window.onload = loadVideos;

    if (window.Telegram && window.Telegram.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
    }
  </script>
</body>
</html>
