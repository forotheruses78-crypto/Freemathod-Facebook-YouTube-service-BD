<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Video Hub</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', Arial, sans-serif;
    background:
      radial-gradient(circle at 50% -10%, rgba(77,166,255,0.14), transparent 50%),
      #060b16;
    color: #eef2f9;
    padding: 20px 16px 40px;
  }

  header { text-align: center; margin-bottom: 18px; }
  header h1 {
    font-family: 'Outfit', sans-serif;
    font-size: 21px; font-weight: 700; color: #f2f6fc;
  }
  header h1 span {
    background: linear-gradient(90deg, #7fc4ff, #4da6ff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    font-weight: 800;
  }

  .sub-badge {
    display: flex; align-items: center; gap: 6px;
    justify-content: center;
    background: rgba(77,166,255,0.1);
    border: 1px solid rgba(77,166,255,0.3);
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 12px; font-weight: 600; color: #7fc4ff;
    margin: 10px auto 18px auto;
    width: fit-content;
  }

  .tabs { display: flex; gap: 8px; margin-bottom: 18px; overflow-x: auto; padding-bottom: 2px; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0; padding: 10px 16px;
    background: #0d1526;
    border: 1px solid rgba(255,255,255,0.06);
    color: #8895ab;
    border-radius: 10px; font-size: 13px; font-weight: 600;
    cursor: pointer; white-space: nowrap;
    transition: all 0.2s ease;
  }
  .tab-btn.active {
    background: linear-gradient(135deg, #2a7de8, #1e6bd6);
    color: white; border-color: transparent;
    box-shadow: 0 4px 14px rgba(30,107,214,0.35);
  }

  .video-card {
    background: linear-gradient(180deg, #0d1526 0%, #0a111f 100%);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px; overflow: hidden; margin-bottom: 18px;
    transition: border-color 0.2s ease;
  }
  .thumb-wrap { position: relative; }
  .thumb-wrap img { width: 100%; display: block; pointer-events: none; aspect-ratio: 16/9; object-fit: cover; }
  .thumb-wrap::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 60%, rgba(6,11,22,0.85) 100%);
  }
  .time-badge {
    position: absolute; top: 10px; right: 10px; z-index: 2;
    background: rgba(6,11,22,0.75);
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.1);
    color: white; padding: 5px 11px; border-radius: 20px;
    font-size: 12px; font-weight: 600;
  }
  .video-card h3 {
    padding: 14px 14px 6px;
    font-size: 15px; font-weight: 600; color: #f2f6fc;
    line-height: 1.4;
  }
  .card-footer { padding: 10px 14px 14px; }
  .download-btn {
    display: block; width: 100%; text-align: center;
    background: linear-gradient(135deg, #2a7de8, #1e6bd6);
    color: white; text-decoration: none; padding: 12px; font-weight: 700;
    border: none; border-radius: 10px; font-size: 14px; cursor: pointer;
    box-shadow: 0 6px 16px rgba(30,107,214,0.3);
    transition: transform 0.15s ease;
  }
  .download-btn:active { transform: scale(0.98); }

  .empty {
    text-align: center; color: #7d8aa8; margin-top: 60px;
    font-size: 14px;
  }
</style>
</head>
<body>
  <header>
    <h1>📚 Premium <span>Video Hub</span></h1>
  </header>
  <div id="subBadge"></div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-all" onclick="showTab('all')">All</button>
    <button class="tab-btn" id="tab-fb_video" onclick="showTab('fb_video')">Facebook Video</button>
    <button class="tab-btn" id="tab-yt_shorts" onclick="showTab('yt_shorts')">YouTube Shorts</button>
    <button class="tab-btn" id="tab-yt_long" onclick="showTab('yt_long')">YouTube Long</button>
    <button class="tab-btn" id="tab-tutorial" onclick="showTab('tutorial')">Tutorial</button>
  </div>

  <div id="gallery">লোড হচ্ছে...</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBL1UNjemUQERSmF_G8_nmxjNnUYQqKPsU",
      authDomain: "freemathod-fb-yt-service-bd.firebaseapp.com",
      projectId: "freemathod-fb-yt-service-bd",
      storageBucket: "freemathod-fb-yt-service-bd.firebasestorage.app",
      messagingSenderId: "1029948659030",
      appId: "1:1029948659030:web:bd901848b2593add4272f7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const DELIVERY_BOT_USERNAME = "freemethodvideodelivery_bot";

    let allVideos = [];
    let currentTab = "all";

    function openDeliveryBot(videoCode) {
      const link = "https://t.me/" + DELIVERY_BOT_USERNAME + "?start=" + videoCode;
      if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.openTelegramLink(link);
      } else {
        window.open(link, "_blank");
      }
    }
    window.openDeliveryBot = openDeliveryBot;

    function renderVideoCard(data) {
      const badgeText = data.time_label === "night" ? "🌙 রাত" : "☀️ দিন";
      return '<div class="video-card">' +
               '<div class="thumb-wrap">' +
                 '<img src="' + data.thumbnail_url + '" alt="' + data.title + '" />' +
                 '<span class="time-badge">' + badgeText + '</span>' +
               '</div>' +
               '<h3>' + data.title + '</h3>' +
               '<div class="card-footer">' +
                 '<button class="download-btn" onclick="openDeliveryBot(\'' + data.video_code + '\')">⬇ Download</button>' +
               '</div>' +
             '</div>';
    }

    function renderTab(tab) {
      const container = document.getElementById('gallery');
      let list = tab === 'all' ? allVideos : allVideos.filter(v => v.category === tab);

      if (list.length === 0) {
        container.innerHTML = '<p class="empty">এই বিভাগে এখনো কোনো ভিডিও নেই।</p>';
        return;
      }

      let html = '';
      list.forEach((data) => { html += renderVideoCard(data); });
      container.innerHTML = html;
    }

    function showTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      renderTab(tab);
    }
    window.showTab = showTab;

    let countdownTimer = null;

    function startCountdown(expiresDate) {
      function tick() {
        const now = new Date();
        const diff = expiresDate - now;

        if (diff <= 0) {
          clearInterval(countdownTimer);
          document.getElementById('subBadge').innerHTML =
            '<div class="sub-badge">⌛ Premium মেয়াদ শেষ হয়ে গেছে</div>';
          return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);

        document.getElementById('subBadge').innerHTML =
          '<div class="sub-badge">⏳ Premium সক্রিয় — বাকি ' +
          days + 'দিন ' + hours + 'ঘণ্টা ' + minutes + 'মিনিট</div>';
      }

      tick();
      countdownTimer = setInterval(tick, 1000 * 60);
    }

    async function loadSubscriptionBadge() {
      const params = new URLSearchParams(window.location.search);
      const username = params.get('user');
      if (!username) return;

      const userRef = doc(db, "premium_users", username);
      const userSnap = await getDoc(userRef);
      if (!userSnap.exists()) return;

      const userData = userSnap.data();
      if (userData.status === "active" && userData.expires_at) {
        const expiresDate = userData.expires_at.toDate();
        if (expiresDate > new Date()) {
          startCountdown(expiresDate);
        }
      }
    }

    async function loadVideos() {
      const videosQuery = query(collection(db, "premium_videos"), orderBy("created_at", "desc"));
      const querySnapshot = await getDocs(videosQuery);

      if (querySnapshot.empty) {
        document.getElementById('gallery').innerHTML = '<p class="empty">এখনো কোনো প্রিমিয়াম ভিডিও যোগ করা হয়নি।</p>';
        return;
      }

      querySnapshot.forEach((doc) => {
        allVideos.push(doc.data());
      });

      renderTab(currentTab);
    }

    window.onload = function() {
      loadVideos();
      loadSubscriptionBadge();
    };

    if (window.Telegram && window.Telegram.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
    }
  </script>
</body>
</html>
